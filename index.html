<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Infinit Celulares - Chatbot</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #667eea; }
        .chat { height: 400px; border: 1px solid #ddd; padding: 10px; overflow-y: auto; margin: 10px 0; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Infinit Celulares</h1>
        <p>Chatbot com IA para triagem de celulares</p>
        <div class="chat" id="chat">
            <p>👋 Olá! Bem-vindo!</p>
        </div>
        <input type="text" id="msg" placeholder="Digite sua mensagem...">
        <button onclick="enviar()">Enviar</button>
    </div>
    <script>
        function enviar() {
            const msg = document.getElementById('msg').value;
            if (msg) {
                document.getElementById('chat').innerHTML += '<p>Você: ' + msg + '</p>';
                document.getElementById('msg').value = '';
            }
        }
    </script>
</body>
</html>
